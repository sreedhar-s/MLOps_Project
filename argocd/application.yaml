apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: churn-model
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sreedhar-s/MLOps_Project.git
    path: k8s
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: churn-model
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true